<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hero Cycle Pricing Engine</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1>Hero Cycle Pricing Engine</h1>
    </header>

    <section id="controls">
      <div class="field">
        <label for="partSelect">Select Parts</label>
        <select id="partSelect" multiple></select>
      </div>
      <div class="field">
        <label for="dateInput">Pricing Date</label>
        <input type="date" id="dateInput" />
      </div>
      <button id="calculateBtn">Calculate Price</button>
    </section>

    <section id="result" class="hidden">
      <h2>Price Breakdown</h2>
      <div id="breakdown"></div>
      <p id="total"></p>
      <p id="dateInfo"></p>
    </section>

    <section id="history" class="hidden">
      <h2>Pricing History</h2>
      <div id="historyList"></div>
    </section>
  </div>
  <script src="script.js"></script>
</body>
</html>
